<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Novedades — Centro de Estudiantes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Source+Serif+4:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet" />
    
    <!-- Estilos -->
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>

    <!-- ════════════════════════════════════════════════════════════════════════
         NAVBAR
    ════════════════════════════════════════════════════════════════════════ -->
    <div id="navbar"></div>

    <section class="py-5">
        <div class="container">
            <p class="section-label">Novedades</p>
            <h1 class="section-title">Últimas noticias</h1>

            <div class="row g-4" id="novedadesContainer"></div>
            
            <div class="alert alert-light mt-4" role="alert">
              <strong>Atención docentes:</strong> si necesitás organizar materiales o instancias de evaluación, contactá al Centro para difundirlas entre los estudiantes.
            </div>
        </div>
    </section>

    <div class="modal fade" id="modalNovedad">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 id="modalTitulo"></h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                
                <div class="modal-body" id="modalBody"></div>
            </div>
        </div>
    </div>

    <!-- ════════════════════════════════════════════════════════════════════════
         FOOTER
    ════════════════════════════════════════════════════════════════════════ -->
    <div id="footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/novedades.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/utils.js"></script>

</body>
</html>
