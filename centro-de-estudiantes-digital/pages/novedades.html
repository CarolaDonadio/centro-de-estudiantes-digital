<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Novedades — Centro de Estudiantes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Source+Serif+4:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet" />
    
    <!-- Estilos -->
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/responsive.css">

<body>

    <!-- ════════════════════════════════════════════════════════════════════════
         NAVBAR
    ════════════════════════════════════════════════════════════════════════ -->
    <div id="navbar"></div>

    <section class="py-5">
        <div class="container">
            <p class="section-label">Novedades</p>
            <h1 class="section-title">Últimas noticias</h1>
            
            <div class="mt-4">
                <div class="news-item">
                    <div class="news-badge">
                        <span class="day">14</span>
                        <span class="mon">Jul</span>
                    </div>

                    <div>
                        <h4>Asamblea general ordinaria</h4>
                        <p>Convocatoria abierta para todos los estudiantes.</p>
                    </div>
                </div>
                
                <div class="news-item">
                    <div class="news-badge">
                        <span class="day">08</span>
                        <span class="mon">Jul</span>
                    </div>
                    
                    <div>
                        <h4>Nueva beca disponible</h4>
                        <p>Inscripción abierta para el segundo cuatrimestre.</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- ════════════════════════════════════════════════════════════════════════
         FOOTER
    ════════════════════════════════════════════════════════════════════════ -->
    <div id="footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/app.js"></script>

    <script src="../js/api.js"></script>
