<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar Sesión — Centro de Estudiantes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Source+Serif+4:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet" />
  <style>
    /* ── Paleta y variables originales ── */
    :root {
      --ce-navy:     #003366;
      --ce-amber:    #E6A817;
      --ce-slate:    #1A2A3A;
      --ce-fog:      #F2F4F7;
      --ce-white:    #FFFFFF;
      --ce-border:   #C9D4E0;
      --ce-amber-dk: #B5820D;
    }

    body {
      font-family: 'Sora', sans-serif;
      font-size: 1rem;
      color: var(--ce-slate);
      background: var(--ce-fog); /* Fondo gris claro para resaltar la tarjeta */
      line-height: 1.75;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }

    /* ── Reutilización de estilos de index.html ── */
    .ce-card {
      border: 1.5px solid var(--ce-border);
      border-radius: 10px;
      background: var(--ce-white);
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 20px rgba(0,51,102,0.05);
    }

    .section-title {
      font-family: 'Source Serif 4', serif;
      font-size: 1.7rem;
      font-weight: 600;
      color: var(--ce-navy);
      text-align: center;
      margin-bottom: 0.5rem;
    }

    .section-lead {
      color: #4A5A6A;
      font-size: 0.97rem;
      text-align: center;
      margin-bottom: 2rem;
    }

    .btn-primary-ce {
      background: var(--ce-amber);
      color: var(--ce-navy);
      font-weight: 700;
      border: 2px solid var(--ce-amber);
      padding: 0.65rem 1.75rem;
      border-radius: 6px;
      font-size: 1rem;
      text-decoration: none;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      transition: background 0.18s;
      width: 100%;
      cursor: pointer;
    }

    .btn-primary-ce:hover {
      background: var(--ce-amber-dk);
      border-color: var(--ce-amber-dk);
    }

    /* ── Estilos específicos para el formulario ── */
    .form-label {
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--ce-navy);
      margin-bottom: 0.4rem;
    }

    .ce-input {
      border: 1.5px solid var(--ce-border);
      border-radius: 6px;
      padding: 0.6rem 1rem;
      font-size: 1rem;
      color: var(--ce-slate);
      width: 100%;
      transition: border-color 0.2s, outline 0.2s;
    }

    .ce-input:focus-visible {
      outline: 3px solid var(--ce-amber);
      outline-offset: 2px;
      border-color: var(--ce-navy);
    }

    /* ── Mensaje de error ── */
    .error-text {
      display: none; /* Oculto por defecto */
      background: #FFF3D0;
      color: #7A5200;
      border-left: 3px solid var(--ce-amber);
      font-size: 0.85rem;
      font-weight: 600;
      padding: 0.6rem 1rem;
      border-radius: 4px;
      margin-top: 1rem;
      text-align: center;
    }

    .error-text.show {
      display: block;
    }
  </style>
</head>
<body>

  <main class="ce-card">
    <div class="text-center mb-3" aria-hidden="true">
      <svg width="42" height="42" viewBox="0 0 28 28" fill="none">
        <rect x="2" y="4" width="12" height="20" rx="2" fill="#E6A817"/>
        <rect x="14" y="4" width="12" height="20" rx="2" fill="rgba(0,51,102,0.1)"/>
        <rect x="13" y="4" width="2" height="20" fill="#003366"/>
        <rect x="5" y="9" width="6" height="1.5" rx="0.75" fill="#003366"/>
        <rect x="5" y="12" width="6" height="1.5" rx="0.75" fill="#003366"/>
        <rect x="5" y="15" width="4" height="1.5" rx="0.75" fill="#003366"/>
      </svg>
    </div>
    
    <h1 class="section-title">Iniciar sesión</h1>
    <p class="section-lead">Accedé al portal del estudiante</p>

    <form id="loginForm" novalidate>
      <div class="mb-3">
        <label for="username" class="form-label">Usuario</label>
        <input type="text" id="username" class="ce-input" placeholder="Ingresá tu usuario" required>
      </div>
      
      <div class="mb-4">
        <label for="password" class="form-label">Contraseña</label>
        <input type="password" id="password" class="ce-input" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn-primary-ce">
        <svg width="18" height="18" viewBox="0 0 14 14" fill="none" aria-hidden="true">
          <rect x="3" y="6" width="8" height="7" rx="1.5" stroke="#003366" stroke-width="1.5" fill="none"/>
          <path d="M5 6V4.5a2 2 0 0 1 4 0V6" stroke="#003366" stroke-width="1.5" stroke-linecap="round" fill="none"/>
          <circle cx="7" cy="9.5" r="1" fill="#003366"/>
        </svg>
        Ingresar
      </button>

      <div id="errorMessage" class="error-text" role="alert">
        Usuario o contraseña incorrectos. Por favor, intentá de nuevo.
      </div>
    </form>
  </main>

 <script>
    document.getElementById('loginForm').addEventListener('submit', async function(event) {
  event.preventDefault();

  const userIngresado = document.getElementById('username').value.trim();
  const passIngresada = document.getElementById('password').value.trim();
  const errorDiv = document.getElementById('errorMessage');

  try {
    // 1. Simulamos la llamada a la base de datos (API Mock)
    const respuesta = await fetch('usuarios.json');
    const usuarios = await respuesta.json();


    // 2. Buscamos si hay coincidencias
    const usuarioValido = usuarios.find(u => u.usuario === userIngresado && u.password === passIngresada);

    if (usuarioValido) {
      errorDiv.classList.remove('show');
      
      // 3. Redirección basada en el ROL
      switch (usuarioValido.rol) {
        case 'estudiante':
          window.location.href = 'post-log.html'; // El dashboard que ya armamos
          break;
        case 'docente':
          window.location.href = 'panel-docente.html';
          break;
        case 'delegado':
          window.location.href = 'panel-delegado.html';
          break;
        case 'administrador':
          window.location.href = 'panel-admin.html';
          break;
        default:
          alert('Rol no reconocido');
      }

    } else {
      // Credenciales incorrectas
      errorDiv.textContent = "Usuario o contraseña incorrectos.";
      errorDiv.classList.add('show');
    }
  } catch (error) {
    console.error("Error al cargar los usuarios:", error);
    errorDiv.textContent = "Error de conexión. Intentá más tarde.";
    errorDiv.classList.add('show');
  }
});
  </script>

</body>
</html>
