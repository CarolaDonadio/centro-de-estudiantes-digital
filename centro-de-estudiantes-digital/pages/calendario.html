<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario — Centro de Estudiantes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Source+Serif+4:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet" />
    
    <!-- Estilos -->
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
    <!-- ════════════════════════════════════════════════════════════════════════
         NAVBAR
    ════════════════════════════════════════════════════════════════════════ -->
    <div id="navbar"></div>

    <div class="container py-5">

  <!-- FILTRO -->
  <div class="mb-4">
    <select id="filtroCarrera" class="form-select">
      <option value="">Todas las carreras</option>
      <option value="Sistemas">Sistemas</option>
      <option value="Derecho">Derecho</option>
    </select>
  </div>

  <!-- CALENDARIO -->
  <div class="ce-card p-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
      <button id="prevMonth" class="btn btn-outline-secondary btn-sm">←</button>
      <h4 id="monthTitle"></h4>
      <button id="nextMonth" class="btn btn-outline-secondary btn-sm">→</button>
    </div>

    <div class="d-grid mb-2" style="grid-template-columns: repeat(7,1fr); text-align:center; font-weight:bold;">
        <div>L</div><div>M</div><div>X</div>
        <div>J</div><div>V</div><div>S</div><div>D</div>
    </div>

    <div id="calendarGrid"></div>

  </div>

</div>

<!-- ════════════════════════════════════════════════════════════════════════
         FOOTER
════════════════════════════════════════════════════════════════════════ -->
<div id="footer"></div>

<!-- MODAL -->
<div class="modal fade" id="modalEventos">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5>Eventos del día</h5>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>
</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/calendario.js"></script>
    
</body>
</html>
